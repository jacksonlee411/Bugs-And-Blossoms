version: 1
entrypoints:
  server:
    routes:
      - path: /
        methods: [GET]
        route_class: ui
      - path: /app
        methods: [GET]
        route_class: ui
      - path: /app/home
        methods: [GET]
        route_class: ui
      - path: /app/dicts
        methods: [GET]
        route_class: ui
      - path: /app/dicts/{dict_code}/values/{code}
        methods: [GET]
        route_class: ui
      - path: /app/org/units
        methods: [GET]
        route_class: ui
      - path: /app/org/units/{org_code}
        methods: [GET]
        route_class: ui
      - path: /app/org/units/field-configs
        methods: [GET]
        route_class: ui
