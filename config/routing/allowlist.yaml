        methods: [GET]
        route_class: ui
      - path: /app/cubebox
        methods: [GET]
        route_class: ui
      - path: /app/login
        methods: [GET]
        route_class: ui
      - path: /assets/{path}
        methods: [GET]
        route_class: static
      - path: /health
        methods: [GET]
        route_class: ops
      - path: /healthz
        methods: [GET]
        route_class: ops
      - path: /iam/api/sessions
        methods: [POST]
        route_class: internal_api
