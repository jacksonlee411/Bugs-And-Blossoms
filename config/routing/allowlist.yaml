        methods: [POST]
        route_class: internal_api
      - path: /internal/cubebox/capabilities
        methods: [GET]
        route_class: internal_api
      - path: /internal/cubebox/settings
        methods: [GET]
        route_class: internal_api
      - path: /internal/cubebox/settings/providers
        methods: [POST]
        route_class: internal_api
      - path: /internal/cubebox/settings/credentials
        methods: [POST]
        route_class: internal_api
