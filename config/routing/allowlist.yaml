        methods: [POST]
        route_class: internal_api
      - path: /iam/api/dicts/values:correct
        methods: [POST]
        route_class: internal_api
      - path: /iam/api/dicts/values/audit
        methods: [GET]
        route_class: internal_api
      - path: /iam/api/dicts:release
        methods: [POST]
        route_class: internal_api
