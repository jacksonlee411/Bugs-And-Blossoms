services:
  api:
    environment:
      LIBRECHAT_RUNTIME_OWNER: bugs-and-blossoms
    volumes:
      - ${LIBRECHAT_DATA_ROOT:?LIBRECHAT_DATA_ROOT is required}/api:/app/data

  mongodb:
    volumes:
      - ${LIBRECHAT_DATA_ROOT:?LIBRECHAT_DATA_ROOT is required}/mongodb:/data/db

  meilisearch:
    volumes:
      - ${LIBRECHAT_DATA_ROOT:?LIBRECHAT_DATA_ROOT is required}/meilisearch:/meili_data

  rag_api:
    volumes:
      - ${LIBRECHAT_DATA_ROOT:?LIBRECHAT_DATA_ROOT is required}/rag_api:/app/data

  vectordb:
    volumes:
      - ${LIBRECHAT_DATA_ROOT:?LIBRECHAT_DATA_ROOT is required}/vectordb:/qdrant/storage
