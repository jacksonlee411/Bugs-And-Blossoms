services:
  api:
    image: ghcr.io/danny-avila/librechat:v0.8.0
    restart: unless-stopped
    env_file:
      - ${LIBRECHAT_RUNTIME_ENV_FILE:-.env}
    environment:
      HOST: 0.0.0.0
      PORT: ${LIBRECHAT_PORT:-3080}
    ports:
      - "${LIBRECHAT_PORT:-3080}:${LIBRECHAT_PORT:-3080}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
