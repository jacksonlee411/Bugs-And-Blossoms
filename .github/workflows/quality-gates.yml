name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  code-quality-formatting:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Go version gate
        run: make check go-version

      - name: Error message gate
        run: make check error-message

      - name: Assistant config single source gate
        run: make check assistant-config-single-source

      - name: Assistant domain allowlist gate
        run: make check assistant-domain-allowlist

      - name: Docs gate
        run: make check doc

      - name: Format gate
        run: make check fmt

      - name: Lint gate
        run: make check lint

      - name: Assert clean worktree
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "[quality-gates] worktree is dirty after Code Quality & Formatting" >&2
            git status --short
            git diff --stat
            exit 1
          fi
          echo "[quality-gates] worktree clean"

  unit-integration-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Tests temporarily disabled
        run: echo "Unit and integration tests temporarily disabled"

  routing-gates:
    name: Routing Gates
    runs-on: ubuntu-latest
    steps:
      - name: Routing gates temporarily disabled
        run: echo "Routing gates temporarily disabled"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: E2E temporarily disabled
        run: echo "E2E tests temporarily disabled"
