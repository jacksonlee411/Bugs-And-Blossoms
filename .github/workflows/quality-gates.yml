name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  code-quality-formatting:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Go version gate
        run: make check go-version

      - name: Error message gate
        run: make check error-message

      - name: Assistant config single source gate
        run: make check assistant-config-single-source

      - name: Assistant domain allowlist gate
        run: make check assistant-domain-allowlist

      - name: Docs gate
        run: make check doc

      - name: Format gate
        run: make check fmt

      - name: Lint gate
        run: make check lint

      - name: Assert clean worktree
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "[quality-gates] worktree is dirty after Code Quality & Formatting" >&2
            git status --short
            git diff --stat
            exit 1
          fi
          echo "[quality-gates] worktree clean"

  unit-integration-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: coverage/coverage.out
          if-no-files-found: ignore

  routing-gates:
    name: Routing Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run routing gates
        run: make check routing

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm
          cache-dependency-path: e2e/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Run E2E tests
        run: make e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e/test-results
          if-no-files-found: ignore

      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: e2e/_artifacts
          if-no-files-found: ignore
