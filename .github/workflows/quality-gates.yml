name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  code-quality-formatting:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Gates temporarily disabled
        run: echo "Quality gates temporarily disabled"
      - name: Assistant config single source gate
        if: false
        run: make check assistant-config-single-source
      - name: Assistant domain allowlist gate
        if: false
        run: make check assistant-domain-allowlist
      - name: No scope package gate
        if: false
        run: make check no-scope-package
      - name: Capability key gate
        if: false
        run: make check capability-key
      - name: Capability contract gate
        if: false
        run: make check capability-contract
      - name: Capability route map gate
        if: false
        run: make check capability-route-map

  unit-integration-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Tests temporarily disabled
        run: echo "Unit and integration tests temporarily disabled"

  routing-gates:
    name: Routing Gates
    runs-on: ubuntu-latest
    steps:
      - name: Routing gates temporarily disabled
        run: echo "Routing gates temporarily disabled"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: E2E temporarily disabled
        run: echo "E2E tests temporarily disabled"
